<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fliqlo Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="waiting-message" id="waitingMsg">
    <div class="pulse-dot"></div>
    Waiting for timer...
  </div>

  <div class="clock" id="clock" style="display: none;">
    <div class="digit" id="day">00</div>
    <div class="digit" id="add">:</div>
    <div class="digit" id="hr">00</div>
    <div class="digit">:</div>
    <div class="digit" id="min">00</div>
    <div class="digit">:</div>
    <div class="digit" id="sec">00</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
