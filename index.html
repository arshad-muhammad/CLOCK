<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fliqlo Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="input-container" id="inputContainer">
    <div class="time-inputs">
      <input type="number" id="days" placeholder="DD" min="0" />
      <input type="number" id="hours" placeholder="HH" min="0" />
      <input type="number" id="minutes" placeholder="MM" min="0" />
      <input type="number" id="seconds" placeholder="SS" min="0" />
    </div>
    <div class="buttons">
      <button onclick="showClock()">Start</button>
    </div>
  </div>

  <div class="clock" id="clock" style="display: none;">
    <div class="digit" id="day">00</div>
    <div class="digit" id="add">:</div>
    <div class="digit" id="hr">00</div>
    <div class="digit">:</div>
    <div class="digit" id="min">00</div>
    <div class="digit">:</div>
    <div class="digit" id="sec">00</div>
  </div>

  <button class="buttons" id="beginBtn" onclick="startCountdown()">Begin Countdown</button>
  <!-- <button onclick="stopCountdown()">Stop</button> -->

  <script src="script.js"></script>
</body>
</html>
